<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA + iOS fullscreen support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />

  <!-- PWA Manifest and Icon -->
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />

  <title>CineNova 💜 - TV Show Viewer</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet" />
  <!-- Navbar stylesheet will be injected dynamically to respect local dev or /cinenova base -->

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #f0f0f0;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    main {
      flex: 1;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      position: relative;
    }

    #playerWrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 800px;
      max-width: 95vw;
      position: relative;
    }

    #playerContainer {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: black;
      border-radius: 12px;
      box-shadow: 0 0 15px #a14effaa;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }

    #fullscreenBtn {
      margin-top: 12px;
      background: #3a1361;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s ease;
      max-width: 120px;
      text-align: center;
    }

    #fullscreenBtn:hover {
      background-color: #a855f7;
    }

    #serverList {
      position: absolute;
      left: 100%;
      margin-left: 20px;
      top: 0;
      width: 140px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      background: rgba(26, 22, 40, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 15px #a14effaa;
      max-height: 300px;
      overflow-y: auto;
    }

    #serverList h2 {
      margin-bottom: 8px;
      font-size: 1.1rem;
      color: #a14eff;
      text-align: center;
    }

    .serverBtn {
      background: #3a1361;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s ease;
      width: 100%;
      text-align: center;
    }

    .serverBtn:hover {
      background-color: #a855f7;
    }

    .serverBtn.active {
      background-color: #a14eff;
      cursor: default;
    }

    #selectors {
      margin-top: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    select {
      background: #2a2a2a;
      border: none;
      border-radius: 8px;
      color: #eee;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    select:hover {
      background-color: #3a1361;
    }

    #closeBtn {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      z-index: 100;
      background: transparent;
      color: white;
      border: none;
      width: 48px;
      height: 48px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 700;
      text-align: center;
      line-height: 48px;
      border-radius: 0;
    }

    .simulated-fullscreen {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 99;
      border-radius: 0 !important;
    }

    .hide-navbar {
      display: none !important;
    }

    #clickShield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: auto; /* intercept clicks by default to prevent accidental ad-click-through */
      background: transparent;
    }

    #shieldControls {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: flex;
      gap: 8px;
      z-index: 20;
      align-items: center;
    }

    .shieldBtn {
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 6px 8px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(4px);
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- Navbar placeholder -->
<div id="navbarContainer"></div>

<main>
  <div id="playerWrapper">
    <div id="playerContainer">
      <iframe
        id="videoPlayer"
        src=""
        title="TV player"
        allowfullscreen
        allow="fullscreen; encrypted-media"
          allow="autoplay; fullscreen; encrypted-media"
        playsinline
        scrolling="no"
      ></iframe>
      <div id="clickShield" aria-hidden="true"></div>
      <div id="shieldControls" aria-hidden="false">
        <div class="shieldBtn" id="shieldStatus">Ad clicks blocked</div>
        <button class="shieldBtn" id="shieldToggle">Enable player</button>
      </div>
    </div>
    <button id="fullscreenBtn">Fullscreen</button>
    <button id="closeBtn">X</button>

    <div id="serverList">
      <h2>Servers</h2>
      <button class="serverBtn active" id="serverVidsrc">VidSrc</button>
      <button class="serverBtn" id="serverVidplay">VidPlay</button>
    </div>

    <div id="selectors">
      <select id="seasonSelect" aria-label="Season selector"></select>
      <select id="episodeSelect" aria-label="Episode selector"></select>
    </div>
    <div id="playerControls" style="margin-top:12px; display:flex; gap:8px; justify-content:center; align-items:center;">
      <div id="playerStatus" aria-live="polite" style="color:#ddd; font-weight:600">Loading player…</div>
      <button id="playOnSiteBtn" class="serverBtn" style="padding:6px 10px; font-size:13px;">Play on site</button>
      <button id="openProviderBtn" class="serverBtn" style="padding:6px 10px; font-size:13px;">Open provider</button>
      <button id="tryNextBtn" class="serverBtn" style="padding:6px 10px; font-size:13px;">Try next server</button>
    </div>
  </div>
</main>

  <script>
  const basePrefix = (location.pathname.split('/').filter(Boolean)[0] === 'Test') ? '/Test' : '';
  fetch(`${basePrefix}/shared/navbar.html`)
     .then(res => res.text())
    .then(html => {
      document.getElementById('navbarContainer').innerHTML = html;
       const script = document.createElement('script');
      script.src = `${basePrefix}/shared/navbar.js`;
      document.body.appendChild(script);
    });
</script>

<script>
  const TMDB_API_KEY = '3ade810499876bb5672f40e54960e6a2';
  const params = new URLSearchParams(window.location.search);
  const tmdbId = params.get('id');
  let imdbId = null;

  const iframe = document.getElementById('videoPlayer');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const closeBtn = document.getElementById('closeBtn');
  const playerContainer = document.getElementById('playerContainer');
  const navbarContainer = document.getElementById('navbarContainer');
  const seasonSelect = document.getElementById('seasonSelect');
  const episodeSelect = document.getElementById('episodeSelect');

  const servers = {
    vidsrc: document.getElementById('serverVidsrc'),
    vidplay: document.getElementById('serverVidplay')
  };

  const openProviderBtn = document.getElementById('openProviderBtn');
  const tryNextBtn = document.getElementById('tryNextBtn');
  const playOnSiteBtn = document.getElementById('playOnSiteBtn');
  const playerStatus = document.getElementById('playerStatus');

  

  let currentSeason = 1;
  let currentEpisode = 1;
  let currentServer = 'vidsrc';

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  fullscreenBtn.onclick = () => {
    if (!isMobile) {
      if (playerContainer.requestFullscreen) {
        playerContainer.requestFullscreen();
      } else if (playerContainer.webkitRequestFullscreen) {
        playerContainer.webkitRequestFullscreen();
      } else if (playerContainer.msRequestFullscreen) {
        playerContainer.msRequestFullscreen();
      }
    } else {
      playerContainer.classList.add('simulated-fullscreen');
    }
    closeBtn.style.display = 'block';
    navbarContainer.classList.add('hide-navbar');
  };

  closeBtn.onclick = () => {
    if (isMobile) {
      playerContainer.classList.remove('simulated-fullscreen');
    } else if (document.fullscreenElement || document.webkitFullscreenElement) {
      document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    }
    closeBtn.style.display = 'none';
    navbarContainer.classList.remove('hide-navbar');
  };

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      closeBtn.style.display = 'none';
      navbarContainer.classList.remove('hide-navbar');
    }
  });

  // ----- Anti-click-ad shield -----
  (function () {
    const clickShield = document.getElementById('clickShield');
    const shieldToggle = document.getElementById('shieldToggle');
    const shieldStatus = document.getElementById('shieldStatus');

    let shieldOn = true;

    function setShield(on) {
      shieldOn = on;
      if (on) {
        clickShield.style.pointerEvents = 'auto';
        shieldStatus.textContent = 'Ad clicks blocked';
        shieldToggle.textContent = 'Enable player';
      } else {
        clickShield.style.pointerEvents = 'none';
        shieldStatus.textContent = 'Player interactive';
        shieldToggle.textContent = 'Disable player';
      }
    }

    clickShield.addEventListener('click', e => {
      if (!shieldOn) return;
      e.preventDefault();
      e.stopPropagation();
      shieldStatus.textContent = 'Blocked ad-click — click "Enable player" to interact';
      setTimeout(() => shieldStatus.textContent = 'Ad clicks blocked', 2200);
    });

    clickShield.addEventListener('auxclick', e => {
      if (!shieldOn) return;
      e.preventDefault();
      e.stopPropagation();
    });

    clickShield.addEventListener('contextmenu', e => {
      if (!shieldOn) return;
      e.preventDefault();
      e.stopPropagation();
    });

    shieldToggle.addEventListener('click', () => setShield(!shieldOn));

    // Initial state: OFF (interactive) — allow provider embeds to behave as before
    setShield(false);
  })();

  function saveProgress() {
    localStorage.setItem(`cinenova-tv-progress-${tmdbId}`, JSON.stringify({
      season: currentSeason,
      episode: currentEpisode
    }));
  }

  function loadProgress() {
    const saved = localStorage.getItem(`cinenova-tv-progress-${tmdbId}`);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        currentSeason = parsed.season || 1;
        currentEpisode = parsed.episode || 1;
      } catch (e) {}
    }
  }

  function setActive(serverKey) {
    Object.keys(servers).forEach(key => {
      if (key === serverKey) servers[key].classList.add('active');
      else servers[key].classList.remove('active');
    });
    currentServer = serverKey;
    updateIframe();
  }

  Object.entries(servers).forEach(([key, btn]) => {
    btn.addEventListener('click', () => {
      if (!btn.classList.contains('active')) setActive(key);
    });
  });

  // 'Open provider' — open current embed src in a new tab
  openProviderBtn.addEventListener('click', () => {
    if (!iframe.src) {
      playerStatus.textContent = 'No provider loaded — select a server first';
      return;
    }
    window.open(iframe.src, '_blank');
  });

  // 'Try next' — rotate through available servers
  const serverKeys = Object.keys(servers);
  tryNextBtn.addEventListener('click', () => {
    const current = serverKeys.findIndex(k => servers[k].classList.contains('active'));
    const next = serverKeys[(current + 1) % serverKeys.length];
    setActive(next);
  });

  // Play on site logic for TV shows — check hosts under /media/tv/:tmdbId or /media/tv/:imdbId
  // Robust on-site existence check helper (HEAD -> Range-GET)
  async function existsHeadOrRange(url) {
    try {
      const headRes = await fetch(url, { method: 'HEAD' });
      if (headRes && headRes.ok) return true;
    } catch (e) {}
    try {
      const getRes = await fetch(url, { method: 'GET', headers: { 'Range': 'bytes=0-0' } });
      if (getRes && (getRes.status === 206 || getRes.status === 200)) return true;
    } catch (e) {}
    return false;
  }

  async function checkOnSiteTvPaths() {
    const basePrefix = (location.pathname.split('/').filter(Boolean)[0] === 'Test') ? '/Test' : '';
    const candidates = [];
    if (tmdbId) {
      candidates.push(
        `${basePrefix}/media/tv/${tmdbId}/master.m3u8`,
        `${basePrefix}/media/tv/${tmdbId}/index.m3u8`,
        `${basePrefix}/media/tv/${tmdbId}.m3u8`,
        `${basePrefix}/media/tv/${tmdbId}.mp4`,
        `${basePrefix}/media/tv/${tmdbId}/video.mp4`
      );
    }
    if (imdbId) {
      candidates.push(
        `${basePrefix}/media/tv/${imdbId}/master.m3u8`,
        `${basePrefix}/media/tv/${imdbId}/index.m3u8`,
        `${basePrefix}/media/tv/${imdbId}.m3u8`,
        `${basePrefix}/media/tv/${imdbId}.mp4`,
        `${basePrefix}/media/tv/${imdbId}/video.mp4`
      );
    }

    for (const url of candidates) {
      try {
        console.debug('[playOnSiteTv] checking', url);
        if (await existsHeadOrRange(url)) return url;
      } catch (err) {
        console.debug('[playOnSiteTv] error checking', url, err);
      }
    }
    return null;
  }

  async function playOnSiteTv() {
    playerStatus.textContent = 'Checking on-site files...';
    const url = await checkOnSiteTvPaths();
    if (!url) {
      playerStatus.textContent = 'No on-site copy found — falling back to provider';
      return;
    }

    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    video.style.width = '100%';
    video.style.height = '100%';
    video.style.borderRadius = '12px';
    video.id = 'sitePlayer';

    if (url.endsWith('.m3u8')) {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else {
        if (!window.Hls) {
          await new Promise((resolve) => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.3.6/dist/hls.min.js';
            s.onload = resolve;
            document.head.appendChild(s);
          });
        }
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      }
    } else {
      video.src = url;
    }

    iframe.style.display = 'none';
    iframe.parentElement.insertBefore(video, iframe);
    playerStatus.textContent = 'Playing on site — enjoy!';
  }

  playOnSiteBtn.addEventListener('click', playOnSiteTv);

  // Auto-detect on-site availability and provide UI hint
  (async function autoDetectTvOnSite() {
    try {
      playOnSiteBtn.disabled = true;
      const url = await checkOnSiteTvPaths();
      if (url) {
        playOnSiteBtn.disabled = false;
        playOnSiteBtn.dataset.foundUrl = url;
        playerStatus.textContent = 'Local copy available — click "Play on site" to play it.';
      } else {
        playOnSiteBtn.disabled = false;
      }
    } catch (err) {
      console.debug('[playOnSiteTv] autodetect failed', err);
      playOnSiteBtn.disabled = false;
    }
  })();

  function updateIframe() {
    if (!imdbId) return;
    saveProgress();
    if (currentServer === 'vidsrc') {
      iframe.src = `https://vidsrc-embed.ru/embed/tv/${imdbId}/${currentSeason}-${currentEpisode}`;
    } else if (currentServer === 'vidplay') {
      iframe.src = `https://vidplay.to/tv/${imdbId}/${currentSeason}/${currentEpisode}`;
    }
  }

  // Show a simple status when iframe content (cross-origin) finishes loading
  iframe.addEventListener('load', () => {
    if (!iframe.src) {
      playerStatus.textContent = 'No provider loaded';
      return;
    }
    playerStatus.textContent = 'Player loaded — if the player shows "unavailable" try "Try next server" or "Open provider".';
  });

  seasonSelect.addEventListener('change', () => {
    currentSeason = parseInt(seasonSelect.value);
    loadEpisodes(currentSeason);
  });

  episodeSelect.addEventListener('change', () => {
    currentEpisode = parseInt(episodeSelect.value);
    updateIframe();
  });

  async function loadSeasons() {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    imdbId = data.external_ids?.imdb_id;

    if (!imdbId) {
      const altRes = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/external_ids?api_key=${TMDB_API_KEY}`);
      const altData = await altRes.json();
      imdbId = altData.imdb_id;
    }

    seasonSelect.innerHTML = '';
    data.seasons.forEach(season => {
      if (season.season_number === 0) return;
      const option = document.createElement('option');
      option.value = season.season_number;
      option.textContent = `Season ${season.season_number}`;
      seasonSelect.appendChild(option);
    });

    seasonSelect.value = currentSeason;
    loadEpisodes(currentSeason);
  }

  async function loadEpisodes(seasonNumber) {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNumber}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();

    episodeSelect.innerHTML = '';
    data.episodes.forEach(ep => {
      const option = document.createElement('option');
      option.value = ep.episode_number;
      option.textContent = `Episode ${ep.episode_number}`;
      episodeSelect.appendChild(option);
    });

    episodeSelect.value = currentEpisode;
    updateIframe();
  }

  loadProgress();
  loadSeasons();
</script>

<!-- 🔒 Load Shared Ad Blocker -->
<script>
  (function(){
    const basePrefix = (location.pathname.split('/').filter(Boolean)[0] === 'Test') ? '/Test' : '';
    const s = document.createElement('script');
    s.src = `${basePrefix}/shared/adblock/adblock.js`;
    document.body.appendChild(s);
  })();
</script>

</body>
</html>
