<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CineNova 💜</title>

  <!-- PWA & iOS fullscreen meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Manifest & Apple Touch Icon -->
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet" />

  <!-- Your existing home page styles -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <!-- Navbar placeholder (same ID as search.html) -->
  <div id="navbar-placeholder"></div>

  <main>
    <div class="search-container">
      <h1>
        <img class="heart-icon" src="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/128/Purple-Heart-3d-icon.png" alt="Heart" style="height: 1em; vertical-align: middle; margin-right: 8px;" />
        CineNova
        <img class="heart-icon" src="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/128/Purple-Heart-3d-icon.png" alt="Heart" style="height: 1em; vertical-align: middle; margin-left: 8px;" />
      </h1>
      <input id="searchInput" type="search" placeholder="Search movies or TV shows..." autocomplete="off" />
      <div class="button-row">
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
    </div>
  </main>

  <!-- Load shared navbar HTML + CSS + JS dynamically like search.html -->
  <script>
    const basePrefix = (location.pathname.split('/').filter(Boolean)[0] === 'Test') ? '/Test' : '';
    fetch(`${basePrefix}/shared/navbar.html`)
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;

        // Load navbar CSS
        const css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = `${basePrefix}/shared/navbar.css`;
        document.head.appendChild(css);

        // Load navbar JS
        const script = document.createElement('script');
        script.src = `${basePrefix}/shared/navbar.js`;
        document.body.appendChild(script);
      });
  </script>

  <!-- Search logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('searchInput');
      const searchBtn = document.getElementById('searchBtn');

      document.querySelector('main').classList.add('visible');

      searchBtn.onclick = () => {
        const query = searchInput.value.trim();
        if (!query) return alert('Please enter a search term');
        window.location.href = `search.html?q=${encodeURIComponent(query)}`;
      };

      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchBtn.click();
      });
    });
  </script>

  <!-- Particle effect -->
  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const dotCount = 80;
    let dots = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initDots() {
      dots = [];
      for (let i = 0; i < dotCount; i++) {
        dots.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2 + 1,
          dx: (Math.random() - 0.5) * 0.7,
          dy: (Math.random() - 0.5) * 0.7,
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur = 8;

      for (let dot of dots) {
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(193, 132, 252, 0.9)';
        ctx.fill();

        dot.x += dot.dx;
        dot.y += dot.dy;

        if (dot.x < 0 || dot.x > canvas.width) dot.dx *= -1;
        if (dot.y < 0 || dot.y > canvas.height) dot.dy *= -1;
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      initDots();
    });

    window.addEventListener('DOMContentLoaded', () => {
      resize();
      initDots();
      animate();
    });
  </script>

</body>
</html>
